<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Andrew Nguyen — Photography</title>
  <meta name="description" content="Detroit-based automotive & lifestyle photographer." />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,700;0,900;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #f0ede8;
      --muted: rgba(240,237,232,.55);
      --accent: #c8a97e;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0c;
      color: var(--white);
      overflow-x: hidden;
    }

    /* ── INTRO SECTION ── */
    .intro {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
    }

    .intro-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .intro-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      display: block;
    }

    /* deep gradient from bottom so text is legible */
    .intro-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0)    0%,
        rgba(0,0,0,.15)  40%,
        rgba(0,0,0,.7)   75%,
        rgba(0,0,0,.92) 100%
      );
    }

    .intro-content {
      position: relative;
      z-index: 1;
      padding: 0 7vw 7vh;
    }

    .intro-eyebrow {
      font-size: clamp(11px, 1.1vw, 14px);
      font-weight: 400;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .intro-name {
      font-size: clamp(52px, 9vw, 130px);
      font-weight: 900;
      line-height: .95;
      letter-spacing: -.03em;
      color: var(--white);
      margin-bottom: 20px;
    }

    .intro-tagline {
      font-size: clamp(14px, 1.4vw, 18px);
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .intro-ctas {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border: 1px solid rgba(240,237,232,.35);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
      transition: background .2s, border-color .2s;
      backdrop-filter: blur(6px);
      background: rgba(255,255,255,.06);
    }

    .btn-outline:hover {
      background: rgba(255,255,255,.14);
      border-color: rgba(240,237,232,.7);
    }

    .btn-solid {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a0a0c;
    }

    .btn-solid:hover {
      background: #dbbf94;
      border-color: #dbbf94;
    }

    /* floating top-right nav */
    .top-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 7vw;
      pointer-events: none;
    }

    .top-nav-brand {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
      pointer-events: all;
      opacity: .9;
    }

    .top-nav-links {
      display: flex;
      gap: 28px;
      pointer-events: all;
    }

    .top-nav-links a {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(240,237,232,.7);
      text-decoration: none;
      transition: color .2s;
    }

    .top-nav-links a:hover { color: var(--white); }

    /* scroll indicator */
    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: .5;
      animation: bounce 2s infinite;
    }

    .scroll-hint span {
      font-size: 10px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--white);
    }

    .scroll-hint svg { width: 18px; height: 18px; fill: none; stroke: var(--white); stroke-width: 2; }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(6px); }
    }

    /* ── COLLECTIONS SECTION ── */
    .collections-section {
      background: #0a0a0c;
      padding: 100px 7vw 80px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--white);
      margin-bottom: 48px;
    }

    .col-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .col-tile {
      position: relative;
      display: block;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 4/3;
      text-decoration: none;
      background: #111;
    }

    .col-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .5s ease, filter .5s ease;
      filter: brightness(.85);
    }

    .col-tile:hover img {
      transform: scale(1.04);
      filter: brightness(1);
    }

    .col-tile-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.75) 0%, transparent 55%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 28px;
    }

    .col-tile-title {
      font-size: clamp(20px, 2.5vw, 28px);
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--white);
      margin-bottom: 4px;
    }

    .col-tile-blurb {
      font-size: 13px;
      color: rgba(240,237,232,.65);
    }

    /* ── FOOTER ── */
    .site-footer {
      background: #0a0a0c;
      border-top: 1px solid rgba(255,255,255,.07);
      padding: 28px 7vw;
      font-size: 13px;
      color: rgba(240,237,232,.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .site-footer a { color: rgba(240,237,232,.4); text-decoration: none; }
    .site-footer a:hover { color: var(--white); }
  </style>
</head>
<body>

  <!-- Floating nav — Home + Earth only -->
  <nav class="top-nav">
    <a class="top-nav-brand" href="./">Andrew Nguyen</a>
    <div class="top-nav-links">
      <a href="./">Home</a>
      <a href="./world.html">🌍 Earth</a>
    </div>
  </nav>

  <!-- Hero / Intro -->
  <section class="intro">
    <div class="intro-bg">
      <img src="images/automobile/gr86/wide-GR86.jpg" alt="Hero background" id="hero-img" />
    </div>
    <div class="intro-content">
      <p class="intro-eyebrow">Detroit · Michigan</p>
      <h1 class="intro-name">Andrew<br>Nguyen</h1>
      <p class="intro-tagline">Automotive &amp; lifestyle photographer — capturing machines and moments.</p>
      <div class="intro-ctas">
        <a href="#collections" class="btn-outline btn-solid">View Work</a>
        <a href="./world.html" class="btn-outline">🌍 Earth</a>
      </div>
    </div>
    <div class="scroll-hint" aria-hidden="true">
      <span>Scroll</span>
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </section>

  <!-- Collections -->
  <section class="collections-section" id="collections">
    <p class="section-label">Collections</p>
    <h2 class="section-title">Browse the work</h2>
    <div class="col-grid" id="col-grid"></div>
  </section>

  <footer class="site-footer">
    <span>© <span id="y"></span> Andrew Nguyen</span>
    <div style="display:flex;gap:20px">
      <a href="./world.html">World</a>
      <a href="./about.html">About</a>
    </div>
  </footer>

  <script src="data.js"></script>
  <script>
    document.getElementById('y').textContent = new Date().getFullYear();

    // Render collection tiles
    const grid = document.getElementById('col-grid');
    grid.innerHTML = (window.COLLECTIONS || []).map(c => `
      <a class="col-tile" href="category.html?c=${encodeURIComponent(c.slug)}" aria-label="${c.title}">
        ${c.cover ? `<img src="${c.cover}" alt="${c.title}" loading="lazy">` : ''}
        <div class="col-tile-overlay">
          <div class="col-tile-title">${c.title}</div>
          <div class="col-tile-blurb">${c.blurb || ''}</div>
        </div>
      </a>`).join('');

    // Smooth scroll for View Work button
    document.querySelector('a[href="#collections"]').addEventListener('click', e => {
      e.preventDefault();
      document.getElementById('collections').scrollIntoView({ behavior: 'smooth' });
    });
  </script>
</body>
</html>
